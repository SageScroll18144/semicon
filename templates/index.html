<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Temperatura | ESP32 Dashboard</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --secondary-color: #60a5fa;
            --accent-color: #f59e0b;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success-color);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        /* Cards */
        .card {
            background-color: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card h2 {
            font-size: 1.125rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-weight: 500;
        }

        /* Temperature Display Card */
        .temp-display {
            grid-column: span 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .temp-value-container {
            position: relative;
            z-index: 2;
        }

        .temp-value {
            font-size: 5rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1;
        }

        .temp-unit {
            font-size: 1.5rem;
            color: var(--text-muted);
            font-weight: 400;
            vertical-align: super;
        }

        .temp-icon {
            font-size: 4rem;
            margin-bottom: 0.5rem;
            transition: color 0.3s ease;
        }

        .temp-status {
            margin-top: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.25rem 1rem;
            border-radius: 999px;
        }

        /* Chart Card */
        .chart-container {
            grid-column: span 1;
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }

        canvas {
            width: 100%;
            height: 100%;
            flex: 1;
        }

        /* Controls Card */
        .controls {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #2563eb;
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background-color: #e5e7eb;
        }

        /* Logs/History */
        .logs {
            grid-column: 1 / -1;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #e5e7eb;
            font-size: 0.875rem;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .log-time {
            color: var(--text-muted);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            border-top: 1px solid #e5e7eb;
            margin-top: auto;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .temp-value { font-size: 3.5rem; }
            .chart-container { grid-column: 1 / -1; }
            header { flex-direction: column; gap: 1rem; align-items: flex-start; }
            .status-badge { align-self: flex-start; }
        }
    </style>
</head>
<body>

    <header>
        <h1>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"></path>
            </svg>
            ESP32 Monitor
        </h1>
        <div class="status-badge">
            <div class="status-dot"></div>
            <span id="connection-status">Sistema Online</span>
        </div>
    </header>

    <main>
        <!-- Card Principal de Temperatura -->
        <section class="card temp-display">
            <div id="weather-icon" class="temp-icon">🌡️</div>
            <div class="temp-value-container">
                <span id="temp-display" class="temp-value">--.-</span>
                <span class="temp-unit">°C</span>
            </div>
            <div id="temp-badge" class="temp-status" style="background-color: #e5e7eb; color: var(--text-muted);">
                Aguardando dados...
            </div>
        </section>

        <!-- Card de Gráfico -->
        <section class="card chart-container">
            <h2>Histórico (Tempo Real)</h2>
            <canvas id="tempChart"></canvas>
        </section>

        <!-- Card de Controle -->
        <section class="card controls">
            <div>
                <h2>Configuração</h2>
                <p style="font-size: 0.875rem; color: var(--text-muted);">Endpoint: <code>/api/temperatura</code></p>
            </div>
            <div>
                <button id="btn-refresh" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6"></path>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                    </svg>
                    Atualizar Agora
                </button>
                <button id="btn-clear" class="btn btn-outline">Limpar Histórico</button>
            </div>
        </section>

        <!-- Card de Logs Recentes -->
        <section class="card logs">
            <h2>Logs Recentes</h2>
            <div id="logs-list">
                <!-- Logs serão inseridos via JS -->
            </div>
        </section>
    </main>

    <footer>
        <p>Dashboard de Monitoramento &copy; 2023 | Desenvolvido para ESP32 & NTC Thermistor</p>
    </footer>

    <script>
        // Elementos do DOM
        const tempDisplay = document.getElementById('temp-display');
        const tempBadge = document.getElementById('temp-badge');
        const weatherIcon = document.getElementById('weather-icon');
        const logsList = document.getElementById('logs-list');
        const canvas = document.getElementById('tempChart');
        const ctx = canvas.getContext('2d');
        const btnRefresh = document.getElementById('btn-refresh');
        const btnClear = document.getElementById('btn-clear');
        const statusText = document.getElementById('connection-status');
        const statusDot = document.querySelector('.status-dot');
        const API_URL = window.location.protocol === 'file:'
            ? 'http://127.0.0.1:5000/api/temperatura'
            : '/api/temperatura';
        const POLL_INTERVAL_MS = 10000;

        // Estado da Aplicação
        let maxDataPoints = 30;
        let dataHistory = [];
        let labels = [];
        let isFetching = false;
        
        // Inicialização do Canvas (responsivo)
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight - 40; // Subtrai o título
            drawChart();
        }
        window.addEventListener('resize', resizeCanvas);
        
        // Inicializar com alguns zeros para o gráfico não começar vazio
        resizeCanvas();

        // --- LÓGICA DE DADOS ---

        function setConnectionState(message, color) {
            statusText.innerText = message;
            statusDot.style.backgroundColor = color;
        }

        function normalizeReading(item) {
            const temperature = Number(item && item.temperatura);

            if (!Number.isFinite(temperature)) {
                return null;
            }

            return {
                temperatura: temperature,
                sensor_id: (item && item.sensor_id) || 'esp32',
                timestamp: (item && (item.timestamp || item.created_at)) || ''
            };
        }

        function formatReadingTime(timestamp, options = {}) {
            const date = timestamp ? new Date(timestamp) : new Date();
            const safeDate = Number.isNaN(date.getTime()) ? new Date() : date;
            const timeOptions = {
                hour: '2-digit',
                minute: '2-digit'
            };

            if (options.seconds !== false) {
                timeOptions.second = '2-digit';
            }

            return safeDate.toLocaleTimeString('pt-BR', timeOptions);
        }

        // Função para atualizar a UI
        function updateUI(temperature) {
            if (!Number.isFinite(temperature)) {
                return;
            }

            // Atualizar número principal
            tempDisplay.innerText = temperature.toFixed(1);

            // Lógica de status baseado na temperatura (exemplo simples)
            if (temperature < 15) {
                tempBadge.innerText = "Frio";
                tempBadge.style.backgroundColor = "#dbeafe"; // azul claro
                tempBadge.style.color = "#1e40af";
                weatherIcon.innerText = "❄️";
            } else if (temperature >= 15 && temperature < 28) {
                tempBadge.innerText = "Confortável";
                tempBadge.style.backgroundColor = "#d1fae5"; // verde claro
                tempBadge.style.color = "#065f46";
                weatherIcon.innerText = "😊";
            } else if (temperature >= 28 && temperature < 35) {
                tempBadge.innerText = "Quente";
                tempBadge.style.backgroundColor = "#ffedd5"; // laranja claro
                tempBadge.style.color = "#9a3412";
                weatherIcon.innerText = "☀️";
            } else {
                tempBadge.innerText = "Muito Quente!";
                tempBadge.style.backgroundColor = "#fee2e2"; // vermelho claro
                tempBadge.style.color = "#991b1b";
                weatherIcon.innerText = "🔥";
            }
        }

        function renderLogs(readings) {
            logsList.innerHTML = '';

            readings.slice(0, 10).forEach((reading) => {
                const item = document.createElement('div');
                const time = document.createElement('span');
                const message = document.createElement('span');
                const value = document.createElement('strong');

                item.className = 'log-item';
                time.className = 'log-time';
                time.textContent = formatReadingTime(reading.timestamp);
                value.textContent = `${reading.temperatura.toFixed(2)} \u00B0C`;
                message.appendChild(value);
                message.appendChild(document.createTextNode(` recebido de ${reading.sensor_id}`));
                item.appendChild(time);
                item.appendChild(message);
                logsList.appendChild(item);
            });
        }

        function renderHistory(rawReadings) {
            const readings = rawReadings.map(normalizeReading).filter(Boolean);

            if (!readings.length) {
                setConnectionState('Aguardando dados do ESP32', '#f59e0b');
                dataHistory = [];
                labels = [];
                logsList.innerHTML = '';
                drawChart();
                return;
            }

            const latestReading = readings[0];
            const chartReadings = readings.slice(0, maxDataPoints).reverse();

            updateUI(latestReading.temperatura);
            dataHistory = chartReadings.map((reading) => reading.temperatura);
            labels = chartReadings.map((reading) => formatReadingTime(reading.timestamp, { seconds: false }));
            renderLogs(readings);
            drawChart();
        }

        // --- GRÁFICO (Canvas puro) ---
        function drawChart() {
            const width = canvas.width;
            const height = canvas.height;
            const padding = 30;

            // Limpar
            ctx.clearRect(0, 0, width, height);

            // Definir limites Y (Min/Max dinâmico)
            let minVal = Math.min(...dataHistory, 20); // Mínimo de 20C se não houver dados
            let maxVal = Math.max(...dataHistory, 30); // Máximo de 30C se não houver dados
            
            // Adicionar margem aos limites
            minVal = Math.floor(minVal - 2);
            maxVal = Math.ceil(maxVal + 2);
            const range = maxVal - minVal;

            if (dataHistory.length < 2) return;

            // Desenhar Eixos
            ctx.beginPath();
            ctx.strokeStyle = '#e5e7eb';
            ctx.lineWidth = 1;
            // Linhas de grade horizontais
            for (let i = 0; i <= 4; i++) {
                const y = padding + (height - 2 * padding) * (i / 4);
                ctx.moveTo(padding, y);
                ctx.lineTo(width - padding, y);
                
                // Texto do eixo Y
                ctx.fillStyle = '#9ca3af';
                ctx.font = '10px sans-serif';
                const valLabel = maxVal - (range * (i / 4));
                ctx.fillText(valLabel.toFixed(0) + '°', 0, y + 3);
            }
            ctx.stroke();

            // Desenhar Linha de Dados
            ctx.beginPath();
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            const xStep = (width - 2 * padding) / (maxDataPoints - 1);

            dataHistory.forEach((val, index) => {
                // X: da esquerda para direita (baseado no index atual vs maxDataPoints)
                // Para fazer o gráfico "correr" para esquerda, o x depende da posição no array relativa ao tamanho total permitido
                // Mas aqui vamos apenas preencher da esquerda para a direita baseado no tamanho atual
                
                const xPos = padding + index * ((width - 2 * padding) / (dataHistory.length > 1 ? dataHistory.length - 1 : 1));
                
                // Y: inverter (0 em canvas é topo)
                const normalizedY = (val - minVal) / range;
                const yPos = (height - padding) - (normalizedY * (height - 2 * padding));

                if (index === 0) {
                    ctx.moveTo(xPos, yPos);
                } else {
                    ctx.lineTo(xPos, yPos);
                }
            });
            ctx.stroke();

            // Adicionar Gradiente abaixo da linha
            const gradient = ctx.createLinearGradient(0, padding, 0, height - padding);
            gradient.addColorStop(0, 'rgba(59, 130, 246, 0.2)');
            gradient.addColorStop(1, 'rgba(59, 130, 246, 0)');
            
            ctx.lineTo(padding + ((dataHistory.length - 1) * ((width - 2 * padding) / (dataHistory.length - 1))), height - padding);
            ctx.lineTo(padding, height - padding);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        // --- CONEXÃO COM A API ---

        async function fetchTemperature() {
            if (isFetching) {
                return;
            }

            isFetching = true;
            btnRefresh.disabled = true;
            setConnectionState('Buscando dados...', '#f59e0b');

            try {
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' },
                    cache: 'no-store'
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const history = Array.isArray(data.historico) ? data.historico : [];

                renderHistory(history);

                if (history.length) {
                    setConnectionState('Recebendo dados do ESP32', '#10b981');
                }
            } catch (error) {
                console.error("Erro ao buscar dados:", error);
                setConnectionState('Erro de Conexão', '#ef4444');
            } finally {
                isFetching = false;
                btnRefresh.disabled = false;
            }
        }

        btnRefresh.addEventListener('click', fetchTemperature);

        btnClear.addEventListener('click', () => {
            dataHistory = [];
            labels = [];
            logsList.innerHTML = '';
            tempDisplay.innerText = '--.-';
            tempBadge.innerText = 'Aguardando dados...';
            tempBadge.style.backgroundColor = '#e5e7eb';
            tempBadge.style.color = 'var(--text-muted)';
            drawChart();
        });

        fetchTemperature();
        setInterval(fetchTemperature, POLL_INTERVAL_MS);

    </script>
</body>
</html>
